<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Surprise for Poornima 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root{
  --rose:#e8476a;
  --blush:#f7c5d0;
  --deep:#1a0a0e;
  --cream:#fff5f7;
  --gold:#d4a04a;
}

body{
  font-family:'Lato',sans-serif;
  background:var(--deep);
  min-height:100vh;
  overflow-x:hidden;
}

.page{
  display:none;
  min-height:100vh;
  width:100%;
  position:relative;
  overflow:hidden;
}

.page.active{
  display:flex;
}

/* PAGE 1 */

#page1{
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:radial-gradient(ellipse at 50% 30%, #3d0a1a 0%, #1a0a0e 70%);
  text-align:center;
}

.stars{
  position:fixed;
  inset:0;
  pointer-events:none;
}

.star{
  position:absolute;
  border-radius:50%;
  background:white;
  animation:twinkle var(--dur,3s) ease-in-out infinite;
  opacity:0;
}

@keyframes twinkle{
  0%,100%{
    opacity:0;
    transform:scale(.5);
  }
  50%{
    opacity:var(--op,.8);
    transform:scale(1);
  }
}

.greeting-wrap{
  position:relative;
  z-index:1;
  animation:fadeSlideDown 1.2s ease forwards;
}
@keyframes shakeNo {

  0%,100% {
    transform: translateX(0);
  }

  20% {
    transform: translateX(-3px);
  }

  40% {
    transform: translateX(3px);
  }

  60% {
    transform: translateX(-3px);
  }

  80% {
    transform: translateX(3px);
  }
}
@keyframes fadeSlideDown{
  from{
    opacity:0;
    transform:translateY(-30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.hey-text{
  font-weight:300;
  font-size:clamp(1rem,3vw,1.4rem);
  color:var(--blush);
  letter-spacing:6px;
  text-transform:uppercase;
  margin-bottom:8px;
}

.name-text{
  font-family:'Dancing Script',cursive;
  font-size:clamp(3.5rem,10vw,7rem);
  color:white;
  text-shadow:0 0 60px rgba(232,71,106,.6);
}

.subtitle{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(1rem,2.5vw,1.35rem);
  color:var(--blush);
  margin-top:16px;
  opacity:0;
  animation:fadeIn 1s ease 1s forwards;
}

@keyframes fadeIn{
  to{
    opacity:1;
  }
}

.heart-btn{
  margin-top:60px;
  cursor:pointer;
  animation:floatHeart 3s ease-in-out infinite, fadeIn 1s ease 1.5s both;
}

.heart-svg{
  width:clamp(120px,25vw,180px);
  filter:drop-shadow(0 0 25px rgba(232,71,106,.7));
  transition:.2s;
}

.heart-btn:hover .heart-svg{
  transform:scale(1.1);
}

.tap-label{
  color:var(--blush);
  margin-top:14px;
  animation:pulse-opacity 2s infinite;
}

@keyframes pulse-opacity{
  0%,100%{opacity:.6}
  50%{opacity:1}
}

@keyframes floatHeart{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

/* PAGE 2 */

#page2{
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:30px 20px;
  background:linear-gradient(135deg,#1a0a0e 0%,#2d0f1f 50%,#1a0a0e 100%);
}

.puzzle-title{
  font-family:'Dancing Script',cursive;
  font-size:clamp(1.8rem,5vw,3rem);
  color:var(--rose);
  margin-bottom:6px;
  text-align:center;
}

.puzzle-sub{
  font-family:'Playfair Display',serif;
  font-style:italic;
  color:var(--blush);
  margin-bottom:30px;
}

#puzzle-container{
  display:grid;
  gap:3px;
  background:rgba(255,255,255,.05);
  border:2px solid rgba(232,71,106,.3);
  border-radius:12px;
  padding:6px;
  box-shadow:0 0 40px rgba(232,71,106,.15);
}

.puzzle-piece{
  overflow:hidden;
  border-radius:4px;
  cursor:pointer;
}

.puzzle-piece.selected{
  outline:3px solid var(--rose);
  box-shadow:0 0 12px rgba(232,71,106,.8);
}

.puzzle-piece canvas{
  display:block;
}

#puzzle-progress{
  margin-top:18px;
  color:var(--blush);
}

.progress-bar-wrap{
  width:280px;
  height:6px;
  background:rgba(255,255,255,.1);
  border-radius:10px;
  margin-top:10px;
  overflow:hidden;
}

.progress-bar-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--rose),var(--gold));
  transition:.4s;
}

/* PAGE 3 */

#page3{
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:radial-gradient(ellipse at 50% 40%, #3d0a1a 0%, #1a0a0e 70%);
}

.question-emoji{
  font-size:5rem;
  animation:bounce 2s infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

.question-text{
  font-family:'Dancing Script',cursive;
  font-size:clamp(2rem,6vw,4rem);
  color:white;
  margin-top:20px;
}

.question-sub{
  color:var(--blush);
  margin-top:10px;
  margin-bottom:40px;
}

.buttons-wrap{
  display:flex;
  gap:30px;
  justify-content:center;
}

.btn-yes,.btn-no{
  border:none;
  border-radius:50px;
  padding:14px 50px;
  font-size:1.1rem;
  cursor:pointer;
}

.btn-yes{
  background:linear-gradient(135deg,var(--rose),#c0304f);
  color:white;
}

.btn-no{
  background:transparent;
  border:2px solid rgba(255,255,255,.3);
  color:white;
  position:fixed;
}

/* PAGE 4 */

#page4{
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:radial-gradient(ellipse at 50% 40%, #2a1040 0%, #0d0519 80%);
  text-align:center;
}

.celeb-title{
  font-family:'Dancing Script',cursive;
  font-size:clamp(2.5rem,8vw,5rem);
  color:var(--gold);
}

.knew-it{
  color:var(--blush);
  margin:10px 0 25px;
}

.gif-frame{
  border-radius:16px;
  overflow:hidden;
  border:3px solid rgba(212,160,74,.5);
  max-width:min(480px,90vw);
}

.gif-frame img{
  width:100%;
}

.celeb-sub{
  margin-top:20px;
  color:var(--rose);
  font-size:1.5rem;
}

.page-transition{
  position:fixed;
  inset:0;
  background:var(--deep);
  z-index:999;
  pointer-events:none;
  opacity:0;
}

.page-transition.fade-in{
  animation:transIn .5s forwards;
}

.page-transition.fade-out{
  animation:transOut .5s ease .3s forwards;
}

@keyframes transIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes transOut{
  from{opacity:1}
  to{opacity:0}
}
</style>
</head>

<body>

<div class="page-transition" id="overlay"></div>

<!-- PAGE 1 -->
<div class="page active" id="page1">

<div class="stars" id="stars"></div>

<div class="greeting-wrap">
<div class="hey-text">Hey</div>
<div class="name-text">Poornima</div>
<div class="subtitle">Someone got a surprise for you ✨</div>
</div>

<div class="heart-btn" onclick="goToPage(2)">
<svg class="heart-svg" viewBox="0 0 100 90">
<path d="M50 82 C50 82 5 50 5 25 C5 11 16 2 28 2 C37 2 45 7 50 14 C55 7 63 2 72 2 C84 2 95 11 95 25 C95 50 50 82 50 82Z"
fill="#e8476a"/>
</svg>
<div class="tap-label">💗 tap the heart 💗</div>
</div>

</div>

<!-- PAGE 2 -->
<div class="page" id="page2">

<div class="puzzle-title">🧩 Solve to Reveal a Secret</div>
<div class="puzzle-sub">Arrange the pieces to unlock your surprise...</div>

<div id="puzzle-container"></div>

<div id="puzzle-progress">Moves: 0</div>

<div class="progress-bar-wrap">
<div class="progress-bar-fill" id="progressFill"></div>
</div>

</div>

<!-- PAGE 3 -->
<div class="page" id="page3">

<div class="question-emoji">🌹</div>

<div class="question-text">
Would you like to go<br>
on a date with me?
</div>

<div class="question-sub">
Choose wisely... or don't 😏
</div>

<div class="buttons-wrap">

<button class="btn-yes" onclick="goToPage(4)">
Yes 💕
</button>

<button class="btn-no" id="noBtn">
No
</button>

</div>

</div>

<!-- PAGE 4 -->
<div class="page" id="page4">

<div class="celeb-title">
I KNEW IT! 🎉
</div>

<div class="knew-it">
</div>

<div class="gif-frame">
<img src="https://media.giphy.com/media/l0MYEqEzwMWFCg8rm/giphy.gif">
</div>

<div class="celeb-sub">
🎊 It's a date! 🎊
</div>

</div>

<script>

// ===================== IMAGE =====================

let PUZZLE_IMAGE_URL = "https://i.postimg.cc/Kv2t8ZQx/Picsart-26-02-16-10-17-49-254.jpg";
// ===================== STARS =====================

function makeStars(id,count=80){
  const c=document.getElementById(id);

  for(let i=0;i<count;i++){
    const s=document.createElement('div');
    s.className='star';

    const size=Math.random()*2.5+.5;

    s.style.cssText=`
      width:${size}px;
      height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --dur:${(Math.random()*4+2).toFixed(1)}s;
      --op:${(Math.random()*.7+.2).toFixed(2)};
    `;

    c.appendChild(s);
  }
}

makeStars('stars');

// ===================== PAGE SWITCH =====================

function goToPage(num){

  const ov=document.getElementById('overlay');

  ov.className='page-transition fade-in';

  setTimeout(()=>{

    document.querySelectorAll('.page')
    .forEach(p=>p.classList.remove('active'));

    document.getElementById('page'+num)
    .classList.add('active');

    ov.className='page-transition fade-out';

    if(num===2) initPuzzle();
    if(num===3) initNoButton();

  },500);
}

// ===================== PUZZLE =====================

const COLS=4;
const ROWS=4;

const PIECE_SIZE=Math.min(
  Math.floor((Math.min(window.innerWidth,500)-60)/COLS),
  110
);

let selectedIdx=null;
let moveCount=0;
let solved=false;

function initPuzzle(){
  buildPuzzle(PUZZLE_IMAGE_URL);
}

function buildPuzzle(imgSrc){

  moveCount=0;
  solved=false;
  selectedIdx=null;

  document.getElementById('puzzle-progress').textContent='Moves: 0';

  const img=new Image();

  img.onload=()=>{

    const container=document.getElementById('puzzle-container');

    container.innerHTML='';

    container.style.gridTemplateColumns=`repeat(${COLS}, ${PIECE_SIZE}px)`;

    const total=COLS*ROWS;

    const order=Array.from({length:total},(_,i)=>i);

    for(let i=order.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [order[i],order[j]]=[order[j],order[i]];
    }

    for(let i=0;i<total;i++){

      const cell=document.createElement('div');
      cell.className='puzzle-piece';

      const cv=document.createElement('canvas');
      cv.width=PIECE_SIZE;
      cv.height=PIECE_SIZE;

      const cx=cv.getContext('2d');

      const tileIdx=order[i];

      const srcX=(tileIdx%COLS)*(img.width/COLS);
      const srcY=Math.floor(tileIdx/ROWS)*(img.height/ROWS);

      cx.drawImage(
        img,
        srcX,
        srcY,
        img.width/COLS,
        img.height/ROWS,
        0,
        0,
        PIECE_SIZE,
        PIECE_SIZE
      );

      cell.dataset.correct=tileIdx;

      cell.appendChild(cv);

      cell.addEventListener('click',()=>onPieceClick(i));

      container.appendChild(cell);
    }

  };

  img.onerror=()=>{
    alert("Image failed to load.");
  };

  img.src=imgSrc;
}

function onPieceClick(idx){

  if(solved) return;

  const all=document.querySelectorAll('.puzzle-piece');

  if(selectedIdx===null){

    selectedIdx=idx;
    all[idx].classList.add('selected');

  }else{

    if(selectedIdx===idx){
      all[idx].classList.remove('selected');
      selectedIdx=null;
      return;
    }

    const a=all[selectedIdx];
    const b=all[idx];

    const ca=a.querySelector('canvas');
    const cb=b.querySelector('canvas');

    a.appendChild(cb);
    b.appendChild(ca);

    const temp=a.dataset.correct;
    a.dataset.correct=b.dataset.correct;
    b.dataset.correct=temp;

    a.classList.remove('selected');

    selectedIdx=null;

    moveCount++;

    document.getElementById('puzzle-progress')
    .textContent=`Moves: ${moveCount}`;

    checkSolved(all);
  }
}

function checkSolved(all){

  const total=COLS*ROWS;

  let correct=0;

  all.forEach((piece,i)=>{
    if(parseInt(piece.dataset.correct)===i){
      correct++;
    }
  });

  const pct=Math.round((correct/total)*100);

  document.getElementById('progressFill').style.width=pct+'%';

  if(correct===total){

    solved=true;

    document.getElementById('puzzle-progress')
    .textContent=`🎉 Solved in ${moveCount} moves!`;

    setTimeout(()=>{
      goToPage(3);
    },1200);
  }
}

// ===================== NO BUTTON =====================

function initNoButton() {

  const btn = document.getElementById('noBtn');

  // Initial visible position
  btn.style.left = '62%';
  btn.style.top = '62%';

  // Make it noticeable immediately
  btn.style.animation = 'shakeNo 1s infinite';
  btn.style.boxShadow = '0 0 20px rgba(255,255,255,0.35)';

  // Little attention-grabbing movement
  let teaseCount = 0;

  const teaser = setInterval(() => {

    btn.style.transform = 'scale(1.15) rotate(-8deg)';

    setTimeout(() => {
      btn.style.transform = 'scale(1) rotate(8deg)';
    }, 180);

    setTimeout(() => {
      btn.style.transform = 'scale(1)';
    }, 360);

    teaseCount++;

    if (teaseCount >= 5) {
      clearInterval(teaser);
    }

  }, 900);

  // Escape mode starts after 2.5 seconds
  setTimeout(() => {

    function moveButton() {

      const btnWidth = btn.offsetWidth;
      const btnHeight = btn.offsetHeight;

      const maxX = window.innerWidth - btnWidth - 20;
      const maxY = window.innerHeight - btnHeight - 20;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      btn.style.left = x + 'px';
      btn.style.top = y + 'px';
    }

    // Desktop
    btn.addEventListener('mouseover', moveButton);

    // Mobile
    btn.addEventListener('touchstart', function(e) {
      e.preventDefault();
      moveButton();
    });

  }, 2500);
}
// ===================== CONFETTI =====================

function launchConfetti(){

  for(let i=0;i<80;i++){

    const c=document.createElement('div');

    c.style.position='fixed';
    c.style.width='10px';
    c.style.height='10px';
    c.style.background=`hsl(${Math.random()*360},100%,70%)`;
    c.style.left=Math.random()*100+'%';
    c.style.top='-20px';
    c.style.borderRadius='50%';
    c.style.pointerEvents='none';

    c.animate([
      {transform:'translateY(0) rotate(0deg)',opacity:1},
      {transform:'translateY(110vh) rotate(720deg)',opacity:0}
    ],{
      duration:3000+Math.random()*3000,
      iterations:1
    });

    document.body.appendChild(c);

    setTimeout(()=>c.remove(),6000);
  }
}

</script>

</body>
</html>
